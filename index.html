<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>EventFlow | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

<form id="loginForm" class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
  <h1 class="text-2xl font-bold text-center mb-6 text-indigo-600">EventFlow</h1>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-4 px-3 py-2 border rounded" required>

  <input id="password" type="password" placeholder="Senha"
    class="w-full mb-6 px-3 py-2 border rounded" required>

  <button class="w-full bg-indigo-600 text-white py-2 rounded">
    Entrar
  </button>

  <p class="text-sm text-center mt-4">
    Não tem conta?
    <a href="register.html" class="text-indigo-600">Cadastre-se</a>
  </p>
</form>

<script type="module" src="js/controllers/authController.js"></script>
</body>
</html>
